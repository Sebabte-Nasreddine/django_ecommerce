worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/wasm
        text/css
        text/javascript
        text/plain
        text/xml
        font/ttf
        font/otf
        image/svg+xml;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Public API cache header (GET only, never POST/PATCH/DELETE) ────────────
    map $request_method $public_api_cache {
        GET     "public, max-age=30, stale-while-revalidate=60";
        default "no-store, no-cache, must-revalidate";
    }

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:8080;
        keepalive 64;
    }

    # ── HTTP → HTTPS redirect (all hosts) ─────────────────────────────────────
    server {
        listen 80;
        server_name sefa.ma www.sefa.ma 79.137.77.241;
        return 301 https://sefa.ma$request_uri;
    }

    # ── www HTTPS → apex redirect ──────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name www.sefa.ma;

        ssl_certificate     /etc/letsencrypt/live/sefa.ma/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sefa.ma/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        return 301 https://sefa.ma$request_uri;
    }

    # ── HTTPS main server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name sefa.ma;

        ssl_certificate     /etc/letsencrypt/live/sefa.ma/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sefa.ma/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        client_max_body_size 25M;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                          always;
        add_header X-Frame-Options           "DENY"                             always;
        add_header X-XSS-Protection          "1; mode=block"                    always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── Uploaded media ─────────────────────────────────────────────────────
        location ^~ /uploads/ {
            alias /app/media/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            types {
                image/webp  webp;
                image/jpeg  jpg jpeg;
                image/png   png;
                image/gif   gif;
            }
            default_type application/octet-stream;
        }

        # ── Auth endpoints: strict rate limit ──────────────────────────────────
        location ~ ^/api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_set_header Host              nginx;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 15s;
            proxy_read_timeout    30s;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── Image upload: extended timeouts ────────────────────────────────────
        location = /api/admin/upload-image {
            proxy_pass http://backend;
            proxy_set_header Host              nginx;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout  15s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
            client_body_timeout   120s;
            proxy_request_buffering off;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── Public read-only API endpoints — short client cache ───────────────
        location ~ ^/api/(products|categories|banner|sizes|advertisements|shipping-settings)($|/) {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_set_header Host              nginx;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 15s;
            proxy_read_timeout    60s;
            add_header Cache-Control $public_api_cache always;
        }

        # ── API proxy → Django/Gunicorn ────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_set_header Host              nginx;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 15s;
            proxy_read_timeout    60s;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        # ── Next.js static assets (immutable 1-year cache) ────────────────────
        location ^~ /_next/static/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # ── All other requests → Next.js ───────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_read_timeout 60s;
        }
    }
}
