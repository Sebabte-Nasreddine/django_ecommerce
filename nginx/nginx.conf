worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/wasm
        text/css
        text/javascript
        text/plain
        text/xml
        font/ttf
        font/otf
        image/svg+xml;

    # ── Rate limiting ──────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:8080;
        keepalive 16;
    }

    # ── HTTP server ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 25M;

        # Security headers (for all responses including API and media)
        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "DENY"                             always;
        add_header X-XSS-Protection        "1; mode=block"                    always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

        # ── Uploaded media: served directly from shared volume (no gunicorn) ──
        location ^~ /uploads/ {
            alias /app/media/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            types {
                image/webp  webp;
                image/jpeg  jpg jpeg;
                image/png   png;
                image/gif   gif;
            }
            default_type application/octet-stream;
        }

        # ── Auth endpoints: strict rate limit ─────────────────────────────────
        location ~ ^/api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_set_header Host              nginx;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 15s;
            proxy_read_timeout    30s;
        }

        # ── Image upload: no rate limit, extended timeouts ─────────────────────
        location = /api/admin/upload-image {
            proxy_pass http://backend;
            proxy_set_header Host              nginx;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout  15s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
            client_body_timeout   120s;
            proxy_request_buffering off;
        }

        # ── API proxy → Django/Gunicorn ────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://backend;
            proxy_set_header Host              nginx;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 15s;
            proxy_read_timeout    60s;
        }

        # ── Next.js static assets (immutable 1-year cache) ────────────────────
        location ^~ /_next/static/ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        # ── All other requests → Next.js ──────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_read_timeout 60s;
        }
    }

    # ── HTTPS (uncomment once you have a domain + SSL certificate) ────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #     # ... copy all locations from the HTTP server block above
    # }
    #
    # Redirect HTTP → HTTPS (uncomment together with the HTTPS block above)
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
