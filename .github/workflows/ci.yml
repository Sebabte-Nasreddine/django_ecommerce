name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE_BACKEND: sebabte/sefa-backend
  DOCKER_IMAGE_FRONTEND: sebabte/sefa-frontend

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sefa
          POSTGRES_USER: sefa
          POSTGRES_PASSWORD: sefa_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq5

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sefa
          DB_USER: sefa
          DB_PASSWORD: sefa_password
          SECRET_KEY: ci-check-key
          DEBUG: "True"
        run: python manage.py check

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sefa
          DB_USER: sefa
          DB_PASSWORD: sefa_password
          SECRET_KEY: ci-test-key
          DEBUG: "True"
        run: python manage.py test --noinput --verbosity=2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_BACKEND }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/frontend
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_FRONTEND }}:latest

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/sefa/deploy
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
